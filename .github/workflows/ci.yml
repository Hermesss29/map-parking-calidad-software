name: CI - Calidad de Software

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

unit-tests:
    name: Pruebas unitarias (JUnit + JaCoCo + SonarCloud)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: map_parking
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: Backend/Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Prepare backend configuration for tests
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      - name: Run tests and coverage check
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/map_parking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn -B clean verify -Dspring.jpa.hibernate.ddl-auto=update

      # 🚨 CORREGIDO: Se limpió el ${{ secrets.secrets... }} que estaba duplicado
      - name: Analyze with SonarCloud
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.projectKey=parking-project -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.login=${SONAR_TOKEN}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Backend/Backend/target/site/jacoco/
          retention-days: 14

  selenium-tests:
    name: Pruebas funcionales (Selenium)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: map_parking
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Prepare backend configuration
        run: cp Backend/Backend/src/main/resources/application.properties.example Backend/Backend/src/main/resources/application.properties

      - name: Build backend
        working-directory: Backend/Backend
        run: mvn -B -DskipTests package

      - name: Start backend
        working-directory: Backend/Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/map_parking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          mkdir -p ../../reports/selenium
          nohup java -jar target/parking-project-0.0.1-SNAPSHOT.jar > ../../reports/selenium/backend-ci.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/user >/dev/null; then
              echo "Backend listo"
              exit 0
            fi
            sleep 5
          done
          echo "Backend no respondió"
          tail -n 80 ../../reports/selenium/backend-ci.log || true
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front/frontend/package-lock.json

      - name: Install and start frontend
        working-directory: Front/frontend
        run: |
          npm ci
          mkdir -p ../../reports/selenium
          nohup npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check > ../../reports/selenium/frontend-ci.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -sf http://localhost:4200/home >/dev/null; then
              echo "Frontend listo"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend no respondió"
          tail -n 80 ../../reports/selenium/frontend-ci.log || true
          exit 1

      # 🚨 SOLUCIÓN A SONARCLOUD: Se utiliza el commit SHA inmutable oficial de setup-chrome para cumplir con la regla de seguridad estricta
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@63e9f4503f19bc3bb19a4e695be2436f56f4d2f0

      - name: Run Selenium tests (headless Chrome en CI)
        working-directory: tests/selenium
        run: mvn -B test -Dbrowser=chrome -Dheadless=true

      - name: Upload Selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-surefire-reports
          path: reports/selenium/surefire-reports/
          retention-days: 14

  jmeter-tests:
    name: Pruebas de Carga y Rendimiento (JMeter)
    runs-on: ubuntu-latest
    needs: selenium-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: map_parking
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Prepare backend configuration
        run: cp Backend/Backend/src/main/resources/application.properties.example Backend/Backend/src/main/resources/application.properties

      - name: Build backend
        working-directory: Backend/Backend
        run: mvn -B -DskipTests package

      - name: Start backend
        working-directory: Backend/Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/map_parking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          mkdir -p ../../reports/jmeter
          nohup java -jar target/parking-project-0.0.1-SNAPSHOT.jar > ../../reports/jmeter/backend-jmeter.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/user >/dev/null; then
              echo "Backend listo para JMeter"
              exit 0
            fi
            sleep 5
          done
          echo "Backend no respondió"
          exit 1

      - name: Install JMeter
        run: sudo apt-get update && sudo apt-get install -y jmeter

      - name: Run JMeter Performance Tests
        run: |
          jmeter -n -t tests/jmeter/parking_load_test.jmx -l reports/jmeter/results.jtl -e -o reports/jmeter/dashboard/

      - name: Upload JMeter Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/jmeter/dashboard/
          retention-days: 14