unit-tests:
    name: Pruebas unitarias (JUnit + JaCoCo + SonarCloud)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # 🚨 PASO NUEVO AÑADIDO: Creamos el archivo application.properties para que el test no busque un archivo inexistente
      - name: Prepare backend configuration for tests
        run: cp src/main/resources/application.properties.example src/main/resources/application.properties

      # 🚨 MODIFICADO: Le pasamos propiedades vacías o simuladas a Maven para que la prueba de contexto no falle al buscar MySQL
      - name: Run tests and coverage check
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: 
        run: mvn -B clean verify

      # Análisis de Calidad (SonarCloud)
      - name: Analyze with SonarCloud
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.projectKey=parking-project -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.login=${SONAR_TOKEN}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Backend/Backend/target/site/jacoco/
          retention-days: 14