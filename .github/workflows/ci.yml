name: CI - Calidad de Software

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Pruebas unitarias (JUnit + JaCoCo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests and coverage check
        run: mvn -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Backend/Backend/target/site/jacoco/
          retention-days: 14

  selenium-tests:
    name: Pruebas funcionales (Selenium)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: map_parking
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build backend
        working-directory: Backend/Backend
        run: mvn -B -DskipTests package

      - name: Start backend
        working-directory: Backend/Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/map_parking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          nohup java -jar target/parking-project-0.0.1-SNAPSHOT.jar > ../../reports/selenium/backend-ci.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:8080/api/user >/dev/null; then
              echo "Backend listo"
              exit 0
            fi
            sleep 5
          done
          echo "Backend no respondió a tiempo"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front/frontend/package-lock.json

      - name: Install frontend and start
        working-directory: Front/frontend
        run: |
          npm ci
          nohup npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check > ../../reports/selenium/frontend-ci.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:4200/home >/dev/null; then
              echo "Frontend listo"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend no respondió a tiempo"
          exit 1

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests (headless Chrome)
        working-directory: tests/selenium
        run: mvn -B test -Dbrowser=chrome -Dheadless=true

      - name: Upload Selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-surefire-reports
          path: reports/selenium/surefire-reports/
          retention-days: 14
